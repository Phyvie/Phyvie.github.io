<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Filter_Showcase </title>
    <link rel="stylesheet" href="ZyKa_Filter.css">
    <script type="module" src="ZyKa_Filter.js"></script>
</head>
<body>

<!-- TODOZyKa further-project-section: missing description / documentation -->
<!-- TODOZyKa further-project-section: rename from "debug" to smth else-->

<div class="debug-main" id="debug-main">
    <div class="debug__filter-container">
    <div class="debug__filter__item" style="background-color: blue" data-filter-tag="blue"> </div>
    <div class="debug__filter__item" style="background-color: red" data-filter-tag="red"> </div>
    <div class="debug__filter__item" style="background-color: yellow" data-filter-tag="yellow"> </div>
</div>

    <div class="debug-grid" data-filter-container="debug-filter-container">
        <div class="debug__item" style="background-color: darkblue" data-project-tags='[{"name": "blue", "relevance": "3"}]'></div>
        <div class="debug__item" style="background-color: darkred" data-project-tags='[{"name": "red", "relevance": "3"}]'></div>
        <div class="debug__item" style="background-color: rebeccapurple" data-project-tags='[{"name": "blue", "relevance": "2"}, {"name": "red", "relevance": "2"}]'></div>
        <div class="debug__item" style="background-color: orange" data-project-tags='[{"name": "yellow", "relevance": "1"}, {"name": "red", "relevance": "2"}]'></div>
        <div class="debug__item" style="background-color: lightblue" data-project-tags='[{"name": "blue", "relevance": "2"}]'></div>
        <div class="debug__item" style="background-color: yellow" data-project-tags='[{"name": "yellow", "relevance": "3"}]'></div>
    </div>
</div>

</body>
</html>
