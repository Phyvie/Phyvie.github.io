<!--
Purpose:
Create a container with multiple items, sort them & set display=none based on the tags the items have

Public API usage example(s):
1. add the attribute data-filter-container="filter-container-name" to the container that has the elements to be filtered (the name currently has no implications)
(if the container is further away from the triggers (see step 3) than a cousin, add an attribute data-filter-container-parent="..." to the closest common ancestor)
(there is currently no support for manually defining which filter-container a filter-trigger accesses)
2. add the filter tags to an item that is a child of the data-filter-container, there are two method to do so:
a) set it in html as an attribute and write the value in the following json format "data-filter-tags='[{"name": "blue", "relevance": "3"}, ...]" ('blue' can be any string; '3' can be any number; ... can be any number of additional tags in the same format). Filter-tags.js parses the whole document once it is loaded, later-added attributes can be parsed with a call to parseFilterTags(rootElement).
b) set the filter tag in javascript, using createFilterTag to create a new filter tag and addFilterTagToElement to add it onto an element.
3. create the buttons that trigger filtering, by giving an element the attribute 'data-filter-trigger="filter-name"'

HINT: the functionality of filter-tags is not case-sensitive

Error-Handling:
If the data-filter-tags attribute is wrongly formatted, thus fails parsing, it will be set to display=none before continuing with the next data-fitler-tags element

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Filter_Showcase </title>
    <link rel="stylesheet" href="filter-tags.css">
    <script type="module" src="filter-tags.js"></script>
</head>
<body>

<div class="example">
    <div class="example__filter-buttons-container">
        <div class="example__filter-button" style="background-color: blue" data-filter-trigger="blue"></div>
        <div class="example__filter-button" style="background-color: red" data-filter-trigger="red"></div>
        <div class="example__filter-button" style="background-color: yellow" data-filter-trigger="yellow"></div>
    </div>

    <div class="example__item-grid" data-filter-container="example-filter-container">
        <div class="example__item filterable" style="background-color: darkblue" data-filter-tags='[{"name": "blue", "relevance": "3"}]'></div>
        <div class="example__item filterable" style="background-color: darkred" data-filter-tags='[{"name": "red", "relevance": "3"}]'></div>
        <div class="example__item filterable" style="background-color: rebeccapurple" data-filter-tags='[{"name": "blue", "relevance": "2"}, {"name": "red", "relevance": "2"}]'></div>
        <div id ="orange" class="example__item filterable" style="background-color: orange" data-filter-tags='[{"name": "yellow", "relevance": "1"}]'></div>
        <div class="example__item filterable" style="background-color: lightblue" data-filter-tags='[{"name": "blue", "relevance": "2"}]'></div>
        <div class="example__item filterable" style="background-color: yellow" data-filter-tags='[{"name": "yellow", "relevance": "3"}]'></div>
    </div>
    <script type="module">
        import {addFilterTagToElement, createFilterTag} from "./filter-tags.js";

        document.addEventListener("dblclick", (event) => {
            console.log("adding Filter Tag");
            addFilterTagToElement(document.getElementById("orange"), createFilterTag("red", 2));
        })

    </script>
</div>

</body>
</html>
